name: keep-alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -fsS --retry 6 --retry-delay 5 --retry-all-errors --max-time 15 \
            https://bussolafin-api.onrender.com/actuator/health
