name: keep-alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -fsS --connect-timeout 20 --retry 10 --retry-delay 8 --retry-all-errors --max-time 150 \
            https://bussolafin-api.onrender.com/actuator/health
